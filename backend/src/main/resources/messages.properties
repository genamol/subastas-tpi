# Subasta
subasta.no.encontrada=La subasta solicitada no existe en el sistema.
subasta.no.activa=La subasta no se encuentra en estado ACTIVA para recibir ofertas.
subasta.expirada=El tiempo de cierre de la subasta ha expirado.
subasta.no.autorizada=No tiene permisos para operar sobre esta subasta.
subasta.fechas.invalidas=La fecha de cierre debe ser posterior a la fecha de inicio.
subasta.tiene.pujas=No se puede cancelar una subasta que ya tiene pujas registradas.
subasta.estado.invalido.publicar=Solo se pueden publicar subastas en estado BORRADOR.
subasta.estado.invalido.cancelar=No se puede cancelar una subasta en el estado actual.

# Puja
puja.monto.insuficiente=El monto ofertado debe superar el precio actual más el incremento mínimo.
puja.monto.menor.precio.base=El monto ofertado debe ser igual o mayor al precio base.
puja.vendedor.invalido=El propietario del producto no puede pujar en su propia subasta.
puja.vendedor.no.puede.pujar=El vendedor de la subasta no puede realizar pujas.
puja.subasta.no.activa=La subasta no se encuentra en estado ACTIVA para recibir ofertas.
puja.subasta.vencida=El tiempo de cierre de la subasta ha expirado.
puja.usuario.bloqueado=El usuario se encuentra suspendido y no puede realizar pujas.

# Usuario
usuario.no.encontrado=El usuario solicitado no existe en el sistema.
usuario.bloqueado=El usuario se encuentra suspendido por la administración.
usuario.ya.bloqueado=El usuario ya se encuentra bloqueado.
usuario.no.bloqueado=El usuario no está bloqueado.

# Producto
producto.no.encontrado=El producto solicitado no existe en el sistema.
producto.no.autorizado=No tiene permisos para operar sobre este producto.
producto.con.subasta.activa=No se puede eliminar un producto con subastas activas.

# Categoría
categoria.no.encontrada=La categoría solicitada no existe en el sistema.
categoria.nombre.duplicado=Ya existe una categoría con ese nombre.
categoria.con.productos=No se puede eliminar una categoría que tiene productos asociados.

# Disputa
disputa.no.encontrada=La disputa solicitada no existe en el sistema.
disputa.subasta.no.adjudicada=Solo se pueden abrir disputas en subastas adjudicadas.
disputa.no.autorizado=Solo el vendedor o el ganador pueden abrir una disputa.
disputa.ya.existe.abierta=Ya existe una disputa abierta para esta subasta.
disputa.ya.resuelta=Esta disputa ya fue resuelta.

# Notificación
notificacion.no.encontrada=La notificación solicitada no existe en el sistema.
notificacion.no.autorizada=No tiene permisos para acceder a esta notificación.

